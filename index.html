<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fix Places</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6200EE">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { font-family:sans-serif; margin:0; padding:10px; }
#map { height:300px; border-radius:10px; margin-bottom:10px; }
input,button { padding:10px; margin:5px 0; width:100%; }
li { margin:5px 0; }
</style>

</head>
<body>

<h2>📍 Fix Places</h2>

<div id="map"></div>

<button id="locBtn">📍 Get Location</button>
<input id="coords" placeholder="Lat, Lon">
<input id="note" placeholder="Note">
<button id="save">💾 Save</button>

<ul id="list"></ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([41.7151, 44.8271], 13);

// OpenStreetMap tiles
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let marker;

// 📍 Получить геолокацию
document.getElementById("locBtn").onclick = () => {
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    document.getElementById("coords").value = lat + "," + lon;

    if(marker) map.removeLayer(marker);
    marker = L.marker([lat, lon]).addTo(map);
    map.setView([lat, lon], 15);
  });
};

// 💾 Сохранение
const list = document.getElementById("list");

function saveData(){
  localStorage.setItem("places", list.innerHTML);
}

function loadData(){
  list.innerHTML = localStorage.getItem("places") || "";
}
loadData();

document.getElementById("save").onclick = () => {
  const text = document.getElementById("note").value;
  const coords = document.getElementById("coords").value;

  if(!text) return;

  const li = document.createElement("li");

  li.innerHTML = `
    ${text}
    <button onclick="openMap('${coords}')">🗺️</button>
    <button onclick="this.parentElement.remove(); saveData()">🗑️</button>
  `;

  list.appendChild(li);
  saveData();
};

// 🗺️ открыть карту
function openMap(coords){
  const [lat, lon] = coords.split(",");
  window.open(`https://www.google.com/maps?q=${lat},${lon}`, "_blank");
}

// 📦 Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
