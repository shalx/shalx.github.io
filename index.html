<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>To-Do</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<meta name="theme-color" content="#6200EE" />
<link rel="manifest" href="manifest.json" />

<style>
:root{
  --primary:#6200EE;
  --accent:#03DAC5;
  --bg:#F1F3F4;
  --card:#ffffff;
  --text:#202124;
}

body{
  margin:0;
  font-family:Roboto, sans-serif;
  background:var(--bg);
}

/* Header */
header{
  background:var(--primary);
  color:white;
  padding:16px;
  font-size:20px;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}

/* Input Card */
.input-card{
  margin:16px;
  background:var(--card);
  border-radius:16px;
  padding:16px;
  box-shadow:0 2px 6px rgba(0,0,0,.15);
  display:flex;
  flex-direction:column;
  gap:10px;
}

input{
  border:none;
  outline:none;
  font-size:16px;
}

/* Buttons */
.row{
  display:flex;
  gap:8px;
}

button{
  border:none;
  border-radius:12px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:500;
}

.primary{background:var(--primary);color:white;}
.accent{background:var(--accent);}

/* List */
.list{
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.item{
  background:var(--card);
  padding:14px;
  border-radius:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 1px 4px rgba(0,0,0,.1);
  transition:.2s;
}

.item.checked span{
  text-decoration:line-through;
  opacity:.6;
}

/* FAB */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:var(--primary);
  color:white;
  font-size:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 10px rgba(0,0,0,.3);
}
</style>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>
</head>
<body>

<header>To-Do</header>

<div class="input-card">
  <input id="task" placeholder="Write a note..." />
  <input id="coords" placeholder="Lat, Lon" />

  <div class="row">
    <button class="accent" onclick="locate()">📍</button>
    <button class="accent" onclick="openMap()">🗺️</button>
    <button class="primary" onclick="add()">SAVE</button>
  </div>
</div>

<div id="list" class="list"></div>

<div class="fab" onclick="add()">+</div>

<script>
const list=document.getElementById("list");

function save(){
  const data=[];
  document.querySelectorAll(".item").forEach(el=>{
    data.push({
      text:el.querySelector("span").textContent,
      checked:el.classList.contains("checked"),
      coords:el.dataset.coords||""
    });
  });
  localStorage.setItem("todo",JSON.stringify(data));
}

function load(){
  JSON.parse(localStorage.getItem("todo")||"[]")
    .forEach(i=>create(i.text,i.checked,i.coords));
}

function create(text,checked=false,coords=""){
  const div=document.createElement("div");
  div.className="item"+(checked?" checked":"");
  div.dataset.coords=coords;

  const span=document.createElement("span");
  span.textContent=text;

  span.onclick=()=>{
    div.classList.toggle("checked");
    save();
  };

  const del=document.createElement("button");
  del.textContent="🗑️";
  del.onclick=()=>{div.remove();save();};

  div.append(span,del);
  list.appendChild(div);
}

function add(){
  const t=document.getElementById("task").value.trim();
  const c=document.getElementById("coords").value.trim();
  if(!t)return;
  create(t,false,c);
  document.getElementById("task").value="";
  document.getElementById("coords").value="";
  save();
}

function locate(){
  navigator.geolocation.getCurrentPosition(p=>{
    document.getElementById("coords").value=
      p.coords.latitude.toFixed(5)+","+p.coords.longitude.toFixed(5);
  });
}

function openMap(){
  const v=document.getElementById("coords").value;
  if(!v)return;
  window.open(`https://www.google.com/maps?q=${v}`);
}

load();
</script>

</body>
</html>
