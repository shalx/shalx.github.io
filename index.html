<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fix Places</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6200EE">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root {
  --primary:#6200EE;
  --accent:#03DAC5;
  --danger:#CF6679;
}

body {
  font-family:sans-serif;
  margin:0;
  padding:12px;
  background:#f5f5f5;
}

#map {
  height:260px;
  border-radius:12px;
  margin-bottom:10px;
}

input,button {
  width:100%;
  padding:10px;
  margin:4px 0;
  border:none;
  border-radius:8px;
  font-size:15px;
}

button {
  background:var(--primary);
  color:#fff;
}

ul {
  list-style:none;
  padding:0;
  margin-top:10px;
}

li {
  background:#fff;
  padding:10px 12px;
  margin:6px 0;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.left {
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}

.mini-btn {
  width:28px;
  height:28px;
  border-radius:50%;
  font-size:14px;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#eee;
  color:#333;
}

.map { color:var(--accent); }
.del { color:var(--danger); }
</style>
</head>

<body>

<h3>📍 Fix Places</h3>

<div id="map"></div>

<button id="locBtn">📍 Get Location</button>
<input id="coords" placeholder="Lat, Lon">
<input id="note" placeholder="Note">
<button id="save">💾 Save</button>

<ul id="list"></ul>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ✅ фикс: объявляем элементы
const note = document.getElementById("note");
const coords = document.getElementById("coords");
const list = document.getElementById("list");

// карта
const map = L.map('map').setView([41.7151, 44.8271], 13);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19
}).addTo(map);

let marker;

// 📍 геолокация
document.getElementById("locBtn").onclick = () => {
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude.toFixed(6);
    const lon = pos.coords.longitude.toFixed(6);

    coords.value = lat + "," + lon;

    if(marker) map.removeLayer(marker);
    marker = L.marker([lat, lon]).addTo(map);
    map.setView([lat, lon], 15);
  }, ()=> alert("Location error"));
};

// 💾 сохранить в localStorage
function saveData(){
  const items = [];
  list.querySelectorAll("li").forEach(li=>{
    items.push({
      text: li.querySelector(".txt").textContent,
      coords: li.dataset.coords
    });
  });
  localStorage.setItem("places", JSON.stringify(items));
}

// 📂 загрузка
function loadData(){
  const data = JSON.parse(localStorage.getItem("places") || "[]");
  data.forEach(i => addItem(i.text, i.coords));
}
loadData();

// ➕ добавить элемент
function addItem(text, coordsValue){
  const li = document.createElement("li");
  li.dataset.coords = coordsValue;

  li.innerHTML = `
    <div class="left">
      <span class="txt">${text}</span>
      ${coordsValue ? `<button class="mini-btn map">🗺️</button>` : ""}
    </div>
    <button class="mini-btn del">🗑️</button>
  `;

  // 🗺️ открыть карту
  const mapBtn = li.querySelector(".map");
  if(mapBtn){
    mapBtn.onclick = ()=>{
      const [lat, lon] = coordsValue.split(",");
      window.open(`https://www.google.com/maps?q=${lat},${lon}`, "_blank");
    };
  }

  // 🗑️ удалить
  li.querySelector(".del").onclick = ()=>{
    li.remove();
    saveData();
  };

  list.appendChild(li);
}

// 💾 кнопка save (исправленная)
document.getElementById("save").onclick = ()=>{
  const text = note.value.trim();
  const c = coords.value.trim();

  if(!text) return;

  addItem(text, c);

  note.value = "";
  coords.value = ""; // бонус очистка

  saveData();
};

// 📦 service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
