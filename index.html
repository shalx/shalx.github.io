<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Save-Found</title>

<meta name="theme-color" content="#6200EE" />
<link rel="manifest" href="manifest.json" />

<style>
:root{
  --primary:#6200EE;
  --accent:#03DAC5;
  --danger:#CF6679;
  --bg:#F5F5F5;
}

body{
  font-family:sans-serif;
  margin:0;
  background:var(--bg);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* inputs */
input{
  padding:12px;
  border:none;
  border-radius:8px;
  font-size:15px;
}

/* кнопки */
button{
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:8px;
  padding:12px;
}

/* верх кнопки */
.top{
  display:flex;
  gap:6px;
}

.top button{
  flex:1;
  background:var(--accent);
}

/* список */
ol{
  list-style:none;
  padding:0;
  display:flex;
  flex-direction:column;
  gap:6px;
}

li{
  background:#fff;
  border-radius:12px;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* левая часть */
.left{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

/* маленькие кнопки 🔘 */
.mini{
  width:28px;
  height:28px;
  border-radius:50%;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  background:#eee;
  color:#333;
}

.map-inline{ color:var(--accent); }
.del-btn{ color:var(--danger); }

.checked span{
  text-decoration:line-through;
  opacity:.6;
}
</style>

<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("service-worker.js"));
}
</script>
</head>

<body>

<div class="top">
  <button id="alertBtn">📍</button>
  <button id="mapBtn">🗺️</button>
</div>

<input id="input1" placeholder="Lat, Lon" />
<input id="myInput" placeholder="Note..." />
<button id="myButton">SAVE</button>

<ol id="data-list"></ol>

<button id="shareBtn">SHARE</button>

<script>
const list=document.getElementById("data-list");

function saveList(){
  const data=[];
  list.querySelectorAll("li").forEach(li=>{
    const text=li.querySelector("span").textContent;
    const checked=li.querySelector("input").checked;
    const coords=li.dataset.coords||"";
    data.push({text,checked,coords});
  });
  localStorage.setItem("savefoun",JSON.stringify(data));
}

function loadList(){
  const data=JSON.parse(localStorage.getItem("savefoun")||"[]");
  data.forEach(i=>addItem(i.text,i.checked,i.coords));
}

function addItem(text,checked=false,coords=""){
  const li=document.createElement("li");
  li.dataset.coords=coords;

  const left=document.createElement("div");
  left.className="left";

  const cb=document.createElement("input");
  cb.type="checkbox";
  cb.checked=checked;

  const txt=document.createElement("span");
  txt.textContent=text;

  if(checked) li.classList.add("checked");

  cb.onchange=()=>{
    li.classList.toggle("checked");
    saveList();
  };

  left.appendChild(cb);
  left.appendChild(txt);

  // 🗺️ кнопка карты
  if(coords){
    const mapBtn=document.createElement("button");
    mapBtn.className="mini map-inline";
    mapBtn.textContent="🗺️";

    mapBtn.onclick=()=>{
      const[lat,lon]=coords.split(/[\s,]+/);
      if(lat&&lon){
        window.open(`https://www.google.com/maps?q=${lat},${lon}`,"_blank");
      }
    };

    left.appendChild(mapBtn);
  }

  // 🗑️ удалить
  const del=document.createElement("button");
  del.className="mini del-btn";
  del.textContent="🗑️";

  del.onclick=()=>{
    li.remove();
    saveList();
  };

  li.appendChild(left);
  li.appendChild(del);
  list.appendChild(li);
}

// SAVE
document.getElementById("myButton").onclick=()=>{
  const txt=document.getElementById("myInput").value.trim();
  const coords=document.getElementById("input1").value.trim();

  if(!txt) return;

  addItem(txt,false,coords);

  document.getElementById("myInput").value="";
  document.getElementById("input1").value=""; // 🔥 очистка

  saveList();
};

// 📍 геолокация
document.getElementById("alertBtn").onclick=()=>{
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude.toFixed(6);
    const lon=pos.coords.longitude.toFixed(6);
    input1.value=`${lat},${lon}`;
  },()=>alert("Location error"));
};

// 🗺️ открыть координаты
document.getElementById("mapBtn").onclick=()=>{
  const v=input1.value.trim();
  if(!v) return;

  const[lat,lon]=v.split(/[\s,]+/);
  if(lat&&lon){
    window.open(`https://www.google.com/maps?q=${lat},${lon}`,"_blank");
  }
};

// 📤 SHARE
document.getElementById("shareBtn").onclick=async()=>{
  const items=[];
  list.querySelectorAll("li").forEach(li=>{
    const chk=li.querySelector("input").checked?"✔️":"⬜";
    const text=li.querySelector("span").textContent;
    const coords=li.dataset.coords||"";
    items.push(coords?`${chk} ${text} (${coords})`:`${chk} ${text}`);
  });

  const msg=items.join("\n")||"Empty list";

  if(navigator.share){
    navigator.share({title:"Save-Found",text:msg});
  }else{
    navigator.clipboard.writeText(msg);
    alert("Copied!");
  }
};

loadList();
</script>

</body>
</html>
