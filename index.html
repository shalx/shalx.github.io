<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Save-Found</title>

<meta name="theme-color" content="#6200EE" />
<link rel="manifest" href="manifest.json" />

<!-- карта -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
  --primary:#6200EE;
  --accent:#03DAC5;
  --danger:#CF6679;
  --bg:#F5F5F5;
}

body{
  font-family:sans-serif;
  margin:0;
  background:var(--bg);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* карта */
#map{
  height:250px;
  border-radius:12px;
}

/* inputs */
input{
  padding:12px;
  border:none;
  border-radius:8px;
}

/* кнопки */
button{
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:8px;
  padding:12px;
}

/* верх */
.top{
  display:flex;
  gap:6px;
}

.top button{
  flex:1;
  background:var(--accent);
}

/* список */
ol{
  list-style:none;
  padding:0;
  display:flex;
  flex-direction:column;
  gap:6px;
}

li{
  background:#fff;
  border-radius:12px;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* левая часть */
.left{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

/* маленькие кнопки */
.mini{
  width:28px;
  height:28px;
  border-radius:50%;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  background:#eee;
  color:#333;
}

.map-inline{ color:var(--accent); }
.del-btn{ color:var(--danger); }

</style>

<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>
</head>

<body>

<div id="map"></div>

<div class="top">
  <button id="alertBtn">📍</button>
</div>

<input id="input1" placeholder="Lat, Lon" />
<input id="myInput" placeholder="Note..." />
<button id="myButton">SAVE</button>

<ol id="data-list"></ol>

<button id="shareBtn">SHARE</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const list=document.getElementById("data-list");
const input1=document.getElementById("input1");
const note=document.getElementById("myInput");

// 🗺️ карта
const map=L.map('map').setView([41.7151,44.8271],13);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19
}).addTo(map);

let marker;

// 💾 сохранить
function saveList(){
  const data=[];
  list.querySelectorAll("li").forEach(li=>{
    data.push({
      text:li.querySelector("span").textContent,
      coords:li.dataset.coords||""
    });
  });
  localStorage.setItem("savefoun",JSON.stringify(data));
}

// 📂 загрузка
function loadList(){
  const data=JSON.parse(localStorage.getItem("savefoun")||"[]");
  data.forEach(i=>addItem(i.text,i.coords));
}

// ➕ добавить
function addItem(text,coords=""){
  const li=document.createElement("li");
  li.dataset.coords=coords;

  const left=document.createElement("div");
  left.className="left";

  const txt=document.createElement("span");
  txt.textContent=text;

  left.appendChild(txt);

  // 🗺️ кнопка
  if(coords){
    const mapBtn=document.createElement("button");
    mapBtn.className="mini map-inline";
    mapBtn.textContent="📍";

    mapBtn.onclick=()=>{
      const[lat,lon]=coords.split(/[\s,]+/);
      showOnMap(lat,lon);
    };

    left.appendChild(mapBtn);
  }

  // 🗑️ удалить
  const del=document.createElement("button");
  del.className="mini del-btn";
  del.textContent="🗑️";
  del.onclick=()=>{
    li.remove();
    saveList();
  };

  // 👉 клик по записи = показать на карте
  left.onclick=()=>{
    if(coords){
      const[lat,lon]=coords.split(/[\s,]+/);
      showOnMap(lat,lon);
    }
  };

  li.appendChild(left);
  li.appendChild(del);
  list.appendChild(li);
}

// 📍 показать на карте
function showOnMap(lat,lon){
  if(!lat||!lon) return;

  if(marker) map.removeLayer(marker);

  marker=L.marker([lat,lon]).addTo(map);
  map.setView([lat,lon],15);
}

// SAVE
document.getElementById("myButton").onclick=()=>{
  const txt=note.value.trim();
  const coords=input1.value.trim();

  if(!txt) return;

  addItem(txt,coords);

  note.value="";
  input1.value="";

  saveList();
};

// 📍 геолокация
document.getElementById("alertBtn").onclick=()=>{
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude.toFixed(6);
    const lon=pos.coords.longitude.toFixed(6);
    input1.value=`${lat},${lon}`;
    showOnMap(lat,lon);
  });
};

// 📤 SHARE
document.getElementById("shareBtn").onclick=async()=>{
  const items=[];
  list.querySelectorAll("li").forEach(li=>{
    const text=li.querySelector("span").textContent;
    const coords=li.dataset.coords||"";
    items.push(coords?`${text} (${coords})`:text);
  });

  const msg=items.join("\n")||"Empty";

  if(navigator.share){
    navigator.share({title:"Save-Found",text:msg});
  }else{
    navigator.clipboard.writeText(msg);
    alert("Copied!");
  }
};

loadList();
</script>

</body>
</html>
